<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>wordy</title>
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>
  <header>
    <h1>wordy</h1>
    <button id="challenge-btn" class="hidden" aria-label="Challenge a friend">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/>
        <polyline points="16 6 12 2 8 6"/>
        <line x1="12" y1="2" x2="12" y2="15"/>
      </svg>
    </button>
  </header>
  <div id="app">
    <div id="game-area">
      <div id="message"></div>
      <div id="board"></div>
    </div>
    <div id="keyboard"></div>
  </div>

  <div id="modal-overlay" class="hidden">
    <div id="modal">
      <button id="modal-close">&times;</button>
      <h2>Challenge a friend</h2>
      <p>Enter a 5-letter word</p>
      <div id="modal-tiles" class="row"></div>
      <input id="modal-input" type="text" inputmode="text" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" />
      <div id="modal-message"></div>
      <div id="modal-actions" class="hidden">
        <button id="modal-share">Share</button>
        <button id="modal-copy">Copy Link</button>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
