<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>wordy</title>
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>
  <div id="app">
    <header>
      <h1>wordy</h1>
    </header>
    <div id="board"></div>
    <div id="keyboard"></div>
    <div id="message"></div>
    <button id="challenge-btn" class="hidden">Challenge a friend</button>
  </div>

  <div id="modal-overlay" class="hidden">
    <div id="modal">
      <button id="modal-close">&times;</button>
      <h2>Challenge a friend</h2>
      <p>Enter a 5-letter word</p>
      <div id="modal-tiles" class="row"></div>
      <div id="modal-message"></div>
      <div id="modal-actions" class="hidden">
        <button id="modal-share">Share</button>
        <button id="modal-copy">Copy Link</button>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
